<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html { background: #2c2c2c; }
  body {
    width: 720pt; height: 405pt; margin: 0; padding: 0;
    background: #2c2c2c; font-family: Arial, Helvetica, sans-serif;
    display: block; position: relative;
  }
  .wrap { position: absolute; left: 48pt; top: 48pt; right: 48pt; bottom: 48pt; }
  h2 { color: #f4f6f6; font-size: 24pt; margin: 0 0 12pt 0; }
  ul { margin: 0; padding-left: 24pt; }
  li { color: #f4f6f6; font-size: 14pt; margin: 6pt 0; }
  .box { background: #202020; border: 1pt solid #aab7b8; border-radius: 8pt; padding: 16pt; }
</style>
</head>
<body>
  <div class="wrap box">
    <h2>Le « CV super‑massif » — pratique</h2>
    <ul>
      <li>Un seul document qui centralise projets, preuves et résultats</li>
      <li>Tags: compétence, secteur, technologie, impact</li>
      <li>Extraction rapide: CV ciblé, lettre courte, 3 points d’impact</li>
      <li>Sources: mails, Git/Notion, LinkedIn, rapports; chiffrer l’impact</li>
    </ul>
  </div>
</body>
</html>
